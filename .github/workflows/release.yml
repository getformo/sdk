name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC trusted publishing
  contents: write  # Required for creating GitHub releases

jobs:
  publish:
    runs-on: ubuntu-latest
    # Bind workflow-context values to env up front. Steps reference these
    # as shell variables ($TAG, $REPO, $COMMIT_SHA) instead of `${{ }}`
    # template interpolation, so attacker-controlled tag names cannot be
    # injected into `run:` script bodies. (Tag pushes are attacker-
    # controllable: anyone able to push a v* tag triggers this workflow.)
    env:
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Validate tag format
        # Fail closed before any other script runs. A strict semver gate
        # means a tag containing shell metacharacters ($(), backticks,
        # quotes, ;) cannot pass — it never reaches a later step.
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "❌ Error: Tag '$TAG' is not a valid vMAJOR.MINOR.PATCH semver tag"
            echo "Releases must be triggered by a strict semver tag, e.g. v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi
          echo "✅ Tag format validated: $TAG"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Fetch all history for changelog generation
          persist-credentials: false

      - name: Verify tag is on main branch
        run: |
          # Check if the tag is reachable from main branch
          git fetch origin main
          if ! git merge-base --is-ancestor "$COMMIT_SHA" origin/main; then
            echo "❌ Error: This tag is not on the main branch"
            echo "Tags must be created on the main branch to trigger a release"
            echo "Current tag: $TAG"
            exit 1
          fi
          echo "✅ Tag is on main branch, proceeding with release"

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          package-manager-cache: false
          # No registry-url - using OIDC trusted publishing instead

      - name: Update npm for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          # $GITHUB_REF is a runner-provided env var (safe shell expansion,
          # not template interpolation). The tag has already been strictly
          # validated above, so VERSION can only be a clean semver string.
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Verify tag matches package.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Error: Tag version (v$VERSION) does not match package.json version ($PKG_VERSION)"
            echo "Please ensure package.json version is updated before creating the tag"
            exit 1
          fi

          echo "✅ Version match confirmed: $VERSION"

      - name: Build SDK
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Get the previous version tag (second most recent v* tag by version order)
          # This is more reliable than using git describe which follows commit ancestry
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found"
          else
            echo "Previous tag: $PREV_TAG"
          fi

          # Get current date
          RELEASE_DATE=$(date +%Y-%m-%d)

          # Generate changelog with PR links
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $TAG"
            # Extract commits with PR numbers and format them
            # Use tab as delimiter to safely handle semicolons and special characters
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s	%h" --no-merges)
          else
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"%s	%h" --no-merges)
          fi

          # Process commits and categorize them
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS=$'\t' read -r message hash; do
            # Skip empty lines
            [ -z "$message" ] && continue

            # Extract PR number if exists
            if [[ $message =~ \(#([0-9]+)\) ]]; then
              PR_NUM="${BASH_REMATCH[1]}"
              # Remove the (#PR_NUM) from message to avoid duplication (handles with or without space)
              CLEAN_MESSAGE=$(echo "$message" | sed -E 's/ ?\(#[0-9]+\)//')
              PR_LINK="[#$PR_NUM](https://github.com/${REPO}/pull/$PR_NUM)"
              COMMIT_LINK="[$hash](https://github.com/${REPO}/commit/$hash)"
              ITEM="$CLEAN_MESSAGE ($PR_LINK) ($COMMIT_LINK)"
            else
              COMMIT_LINK="[$hash](https://github.com/${REPO}/commit/$hash)"
              ITEM="$message ($COMMIT_LINK)"
            fi

            # Categorize by prefix and strip conventional commit prefix
            if [[ $message =~ ^feat(\([^\)]+\))?: ]]; then
              # Strip "feat:" or "feat(scope):" from the beginning of ITEM
              STRIPPED_ITEM=$(echo "$ITEM" | sed -E 's/^feat(\([^)]+\))?: //')
              FEATURES="${FEATURES}- ${STRIPPED_ITEM}
          "
            elif [[ $message =~ ^fix(\([^\)]+\))?: ]]; then
              # Strip "fix:" or "fix(scope):" from the beginning of ITEM
              STRIPPED_ITEM=$(echo "$ITEM" | sed -E 's/^fix(\([^)]+\))?: //')
              FIXES="${FIXES}- ${STRIPPED_ITEM}
          "
            else
              OTHER="${OTHER}- ${ITEM}
          "
            fi
          done <<< "$COMMITS"

          # Create release notes
          cat > release_notes.md <<EOF
          $VERSION ($RELEASE_DATE)
          EOF

          # Add Features section if exists
          if [ -n "$FEATURES" ]; then
            cat >> release_notes.md <<EOF

          ## Features

          $FEATURES
          EOF
          fi

          # Add Fixes section if exists
          if [ -n "$FIXES" ]; then
            cat >> release_notes.md <<EOF

          ## Bug Fixes

          $FIXES
          EOF
          fi

          # Add Other changes if exists
          if [ -n "$OTHER" ]; then
            cat >> release_notes.md <<EOF

          ## Changes

          $OTHER
          EOF
          fi

          # Add npm package link
          cat >> release_notes.md <<EOF

          ## Install

          This release is available on NPM and CDN.

          ### NPM

          [@formo/analytics $VERSION npm package](https://www.npmjs.com/package/@formo/analytics/v/$VERSION)

          ### CDN

          \`\`\`html
          <script
            src="https://cdn.formo.so/analytics@$VERSION"
            integrity="sha384-[HASH_WILL_BE_GENERATED_AFTER_PUBLISH]"
            crossorigin="anonymous"
          ></script>
          \`\`\`
          EOF

      - name: Publish to npm
        run: npm publish --provenance
        # Explicitly use --provenance flag for clarity
        # OIDC trusted publishing (id-token: write) enables automatic provenance generation

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and Add SRI to GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Published version: $VERSION"

          # Wait for npm CDN to propagate
          echo "Waiting 30 seconds for CDN propagation..."
          sleep 30

          if [ -f "scripts/generate-sri.sh" ]; then
            bash scripts/generate-sri.sh "$VERSION"
          else
            echo "⚠️ SRI script not found at scripts/generate-sri.sh"
          fi
